server:
  port: 8080
  # base_url is the externally reachable address of this server.
  # It is used to build the media URLs injected into proxied RSS feeds.
  # Change this to your server's IP, hostname, or domain before adding feeds
  # to a podcast app — external clients cannot reach "localhost".
  base_url: "http://localhost:8080"

storage:
  cache_dir: "./cache"
  data_dir: "./data"

defaults:
  refresh_interval_minutes: 60
  auto_prefetch: false
  prefetch_max_age_days: 30
  prefetch_concurrency: 2
