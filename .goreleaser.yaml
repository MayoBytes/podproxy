version: 2

project_name: podproxy

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^feat'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  footer: |
    ## Docker
    ```
    docker pull ghcr.io/mayobytes/podproxy:{{ .Tag }}
    ```

dockers:
  - image_templates:
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-amd64"
    use: buildx
    dockerfile: deploy/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: deploy/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
  - image_templates:
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-armv7"
    use: buildx
    goarch: arm
    goarm: "7"
    dockerfile: deploy/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm/v7"

docker_manifests:
  - name_template: "ghcr.io/mayobytes/podproxy:{{ .Tag }}"
    image_templates:
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-amd64"
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-arm64"
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-armv7"
  - name_template: "ghcr.io/mayobytes/podproxy:latest"
    image_templates:
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-amd64"
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-arm64"
      - "ghcr.io/mayobytes/podproxy:{{ .Tag }}-armv7"
